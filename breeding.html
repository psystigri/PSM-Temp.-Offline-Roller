<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>PSM Breeding Roller</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js"></script>
  </head>
  <body>

    <h1>
      PSM Breeding
    </h1>

    <div id="resultsBox">
      <div id="results">
      </div>
    </div>

    <hr>

    <button onclick="breed('results')">
      Roll
    </button>

    <br>

    <input id="sire" placeholder="Paste Parent 1">
     x
    <input id="dam" placeholder="Paste Parent 2">
    <p style="font-style: italic; opacity: 0.7">
      Please omit shiny sparkles from parents when pasting!
    </p>
    <hr>

    <input type="checkbox" id="ovalCharm" unchecked> Using Oval Charm |
    <input type="checkbox" id="includeEgg" checked> Include <b>(EGG)</b>

  </body>
