<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>PSM List Picker</title>
    <link rel="stylesheet" href="style.css">
    <script>
    // OTHER FUNCTIONS -------------------------------------------------------------

    // random number (integer) generator
    function random(max) {
      return Math.floor(Math.random() * max)
    }

    function rarity(common,uncommon,rare) {
      var num = random(common+uncommon+rare)
      var final = 0

      if (num <= rare) {
        final = 2
      } else if (num <= uncommon) {
        final = 1
      } else {
        final = 0
      }

      return final
    }


    // LISTPICKER SCRIPTS -------------------------------------------------------------
    function pickFromList(divID) {
      var rawList = document.getElementById("listArea").value.split("\n").map(item => item.trim())
      var amnt = document.getElementById("rollAmnt").value
      var pay = document.getElementById("payInput").value
      var output = []

      // Clamps pay to 100-2000 range
      if (pay < 100 || pay == undefined) {
        pay = 100
      } else if (pay > 2000) {
        pay = 2000
      }

      // Payment percentage
      var percent = ((pay-100)/1900).toFixed(2)
      // Calculates odds
      var one = ((15*(1-percent))+5)*10
      var two = ((4*(1-percent))+6)*10
      var three = ((5*percent)+3)*10
      var four = ((10*percent)+1)*10

      var total = one+two+three+four // total odds value
      var combined = [one,two,three,four] // array of combined odds

      // random value between 0 and full odds
      var ran = random(total)

      var cumulative = 0;

      // Checks which amount 'ran' falls under
      if (amnt == 0) {
        for (let i = 0; i < combined.length; i++) {
          // adds the value of the current odd "level", in order to check which level 'cumulative' is currently at
          cumulative += combined[i];

          // if ran is lower than the current cumulative value, that means that "i" is at the correct level / amnt
          if (ran < cumulative) {
            amnt = i + 1;
            break;
          }
        }
      }

      // Adds appropriate amount of items to 'output'

      var listLength = rawList.length

      for (let i = 0; i < amnt; i++) {
        ran = random(listLength)
        output.push(rawList[ran])
      }

      // writes to #results
      document.getElementById(divID).innerHTML = output.join("<br>")
    }
    </script>
    <style>
      body {
        text-align: center;
        background-color: #46464E;
        color: #E1E1E1
      }

      a {
        color: #52A4FF
      }

      #resultsBox {
        max-width: 700px;
        padding: 20px;
        border: solid 2px #7E7E84;
        border-radius: 10px;
        margin: auto;
      }

      .traitList {
        max-width: 350px;
        margin: 10px;
        padding: 7px 10px;
        font-size: 12px;
        background-color: #303032;
        border-radius: 10px;
      }

      hr {
        max-width: 1000px;
        margin-top: 30px;
        margin-bottom: 30px;
      }

      textarea {
        background-color: #303032;
        color: inherit;
        min-width: 20%;
      }
    </style>
  </head>
  <body>
    <h1>General List Picker</h1>
    <div id="resultsBox">
      <div id="results" style="line-height: 30px;">
      </div>
    </div>
    <p style="font-size: 90%; font-style: italic;">
      Use for Gambling Paradise, etc.
    </p>

    <button onclick="pickFromList('results')">
      Roll
    </button>

    <hr>

    <select id="rollAmnt">
      <option value="1">1 Item</option>
      <option value="2">2 Items</option>
      <option value="3">3 Items</option>
      <option value="4">4 Items</option>
      <option value="0" selected>Use Poké</option>
    </select>
    <input id="payInput" placeholder="Currency paid (100-2000)" style="max-width: 70px;">

    <br><br>

    <b>Item List</b>
    <br>
    <textarea id="listArea" spellcheck=false>
    </textarea>
    <p style="font-size: 90%; font-style: italic;">
      You can find a list of gambling items in the list folder, or <a href="https://docs.google.com/document/d/1w4Nu6kGzOe1x1O_1j8wsjB0gzNzbyN86l8EidiTGsaA">here</a> (GDocs)
    </p>

  </body>
